name: Build Cross-Platform Executables

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller toml

    - name: Build application
      run: python pyinstaller_build.py

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-build
        path: dist/

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller toml

    - name: Get version
      id: get_version
      run: |
        version=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
        echo "version=$version" >> $GITHUB_OUTPUT
      shell: bash

    - name: Build ARM version
      run: python pyinstaller_build.py

    - name: Package ARM app
      run: |
        cd dist
        # 检查所有可能的输出格式
        APP_NAME="加单分配系统_v3_v${{ steps.get_version.outputs.version }}_Mac-ARM"
        if [ -d "$APP_NAME.app" ]; then
          zip -r "$APP_NAME.zip" "$APP_NAME.app"
          rm -rf "$APP_NAME.app"
        elif [ -d "$APP_NAME" ]; then
          zip -r "$APP_NAME.zip" "$APP_NAME"
          rm -rf "$APP_NAME"
        elif [ -f "$APP_NAME" ]; then
          zip "$APP_NAME.zip" "$APP_NAME"
        else
          echo "No valid output found"
          ls -la
          # 看看有没有其他可能的文件
          for f in *; do
            if [[ $f == *Mac-ARM* ]]; then
              echo "Found potential file: $f"
              if [ -d "$f" ]; then
                zip -r "${f}.zip" "$f"
                rm -rf "$f"
              elif [ -f "$f" ]; then
                zip "${f}.zip" "$f"
              fi
            fi
          done
        fi
        ls -la
      shell: bash

    - name: Upload ARM artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mac-ARM-build
        path: dist/

    - name: Clean build directory
      run: rm -rf dist build *.spec

    - name: Build Intel version
      run: python pyinstaller_build.py
      env:
        PYINSTALLER_TARGET_ARCH: x86_64

    - name: Package Intel app
      run: |
        cd dist
        # 检查所有可能的输出格式
        APP_NAME="加单分配系统_v3_v${{ steps.get_version.outputs.version }}_Mac-Intel"
        if [ -d "$APP_NAME.app" ]; then
          zip -r "$APP_NAME.zip" "$APP_NAME.app"
          rm -rf "$APP_NAME.app"
        elif [ -d "$APP_NAME" ]; then
          zip -r "$APP_NAME.zip" "$APP_NAME"
          rm -rf "$APP_NAME"
        elif [ -f "$APP_NAME" ]; then
          zip "$APP_NAME.zip" "$APP_NAME"
        else
          echo "No valid output found"
          ls -la
          # 看看有没有其他可能的文件
          for f in *; do
            if [[ $f == *Mac-Intel* ]]; then
              echo "Found potential file: $f"
              if [ -d "$f" ]; then
                zip -r "${f}.zip" "$f"
                rm -rf "$f"
              elif [ -f "$f" ]; then
                zip "${f}.zip" "$f"
              fi
            fi
          done
        fi
        ls -la
      shell: bash

    - name: Upload Intel artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mac-Intel-build
        path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller toml

    - name: Build application
      run: python pyinstaller_build.py

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Linux-build
        path: dist/

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install toml
      run: pip install toml

    - name: Get version from pyproject.toml
      id: get_version
      run: |
        version=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
        echo "version=$version" >> $GITHUB_OUTPUT
      shell: bash

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List downloaded artifacts
      run: |
        ls -la artifacts/
        ls -la artifacts/*/

    - name: Delete existing release if exists
      uses: dev-drprasad/delete-tag-and-release@v0.2.1
      with:
        delete_release: true
        tag_name: v${{ steps.get_version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true

    - name: Create new release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: "Automated release for version ${{ steps.get_version.outputs.version }}\n\n**平台支持:**\n- Windows: 加单分配系统_v3_v${{ steps.get_version.outputs.version }}_Windows.exe\n- Mac ARM: 加单分配系统_v3_v${{ steps.get_version.outputs.version }}_Mac-ARM.zip\n- Mac Intel: 加单分配系统_v3_v${{ steps.get_version.outputs.version }}_Mac-Intel.zip\n- Linux: 加单分配系统_v3_v${{ steps.get_version.outputs.version }}_Linux"
        files: |
          artifacts/**/*.zip
          artifacts/**/*.exe
          artifacts/**/Linux*
          artifacts/**/Windows*
          artifacts/**/Mac-ARM*
          artifacts/**/Mac-Intel*
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
