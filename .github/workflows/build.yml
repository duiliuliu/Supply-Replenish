name: Build Cross-Platform Executables

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build application
      run: python pyinstaller_build.py

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-build
        path: dist/

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build ARM version
      run: python pyinstaller_build.py

    - name: Upload ARM artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mac-ARM-build
        path: dist/

    - name: Clean build directory
      run: rm -rf dist build *.spec

    - name: Build Intel version using Rosetta
      run: arch -x86_64 python pyinstaller_build.py

    - name: Upload Intel artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mac-Intel-build
        path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build application
      run: python pyinstaller_build.py

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: Linux-build
        path: dist/

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install toml
      run: pip install toml

    - name: Get version from pyproject.toml
      id: get_version
      run: |
        version=$(python -c "import toml; print(toml.load('pyproject.toml')['project']['version'])")
        echo "version=$version" >> $GITHUB_OUTPUT
      shell: bash

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create or update release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.get_version.outputs.version }}
        name: Release v${{ steps.get_version.outputs.version }}
        body: "Automated release for version ${{ steps.get_version.outputs.version }}"
        files: |
          artifacts/**/*
        overwrite: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

